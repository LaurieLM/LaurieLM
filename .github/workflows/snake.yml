name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *" # toutes les 12h
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: LaurieLM
          # version stylée avec couleur verte, fond sombre
          color: "#39ff14"
          background: "#0d1117"
          outputs: |
            dist/github-contribution-grid-snake.svg

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
